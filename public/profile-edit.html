<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarXMeet — Mon profil</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/profile-edit.css" />
</head>
<body class="flex items-center justify-center p-4 py-10 min-h-screen">
<div id="root" class="w-full"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    function getToken() { return localStorage.getItem('jwt_token'); }
    function authHeaders(extra = {}) { return { 'Authorization': 'Bearer ' + getToken(), ...extra }; }
    function decodeToken() {
        try {
            const payload = JSON.parse(atob(getToken().split('.')[1]));
            return { username: payload.username || payload.sub };
        } catch { return null; }
    }

    function ProfileEditPage() {
        const [myUser, setMyUser] = useState(null);
        const [fields, setFields] = useState({
            firstName: '', lastName: '', username: '', email: '', phone: '',
            snapchat: '', instagram: '', twitter: '', tiktok: ''
        });
        const [photoFile, setPhotoFile] = useState(null);
        const [photoPreview, setPhotoPreview] = useState(null);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);
        const [alert, setAlert] = useState(null);

        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }
            const decoded = decodeToken();
            if (!decoded) { window.location.href = '/connexion.html'; return; }

            fetch(`/api/users?username=${decoded.username}`, { headers: authHeaders() })
                .then(r => {
                    if (r.status === 401) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return null; }
                    return r.json();
                })
                .then(data => {
                    if (!data) return;
                    const users = data['member'] || data['hydra:member'] || [];
                    const me = users.find(u => u.username === decoded.username);
                    if (!me) return;
                    setMyUser(me);
                    setFields({
                        firstName: me.firstName || '',
                        lastName: me.lastName || '',
                        username: me.username || '',
                        email: me.email || '',
                        phone: me.phone || '',
                        snapchat: me.snapchat || '',
                        instagram: me.instagram || '',
                        twitter: me.twitter || '',
                        tiktok: me.tiktok || '',
                    });
                    if (me.profileImageBase64) setPhotoPreview(`data:image/jpeg;base64,${me.profileImageBase64}`);
                })
                .catch(() => setAlert({ type: 'error', message: 'Impossible de charger le profil.' }))
                .finally(() => setLoading(false));
        }, []);

        const set = field => e => setFields(f => ({ ...f, [field]: e.target.value }));

        function handlePhotoChange(e) {
            const file = e.target.files[0];
            if (!file) return;
            setPhotoFile(file);
            const reader = new FileReader();
            reader.onload = ev => setPhotoPreview(ev.target.result);
            reader.readAsDataURL(file);
        }

        async function handleSubmit(e) {
            e.preventDefault();
            if (!myUser) return;
            setSaving(true);
            setAlert(null);
            try {
                const fd = new FormData();
                Object.entries(fields).forEach(([k, v]) => { if (v) fd.append(k, v); });
                if (photoFile) fd.append('profilePhoto', photoFile);

                const res = await fetch(`/api/users/${myUser.id}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken(), 'X-HTTP-Method-Override': 'PATCH' },
                    body: fd
                });
                if (!res.ok) throw new Error();
                setAlert({ type: 'success', message: 'Profil mis à jour !' });
            } catch {
                setAlert({ type: 'error', message: 'Impossible de mettre à jour le profil.' });
            } finally {
                setSaving(false);
            }
        }

        function Field({ label, id, type = 'text', field, placeholder }) {
            return (
                <div>
                    <label htmlFor={id} className="input-label">{label}</label>
                    <input id={id} type={type} className="input-field" value={fields[field]} onChange={set(field)} placeholder={placeholder} />
                </div>
            );
        }

        if (loading) {
            return (
                <div className="w-full max-w-lg mx-auto">
                    <div className="skeleton" style={{ height: 400, borderRadius: 16 }} />
                </div>
            );
        }

        return (
            <div className="w-full max-w-lg mx-auto">
                <div className="text-center mb-6">
                    <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    <p className="text-gray-400 text-sm">La communauté des passionnés de voitures</p>
                </div>

                <div className="card rounded-2xl p-6 shadow-2xl">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
                        <h2 className="text-white font-bold text-lg m-0">Mon profil</h2>
                        <div style={{ display: 'flex', gap: 8 }}>
                            <a href="/garage.html" className="btn-dark inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                                Mon garage
                            </a>
                            <a href="/home.html" className="btn-outline inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                                Accueil
                            </a>
                        </div>
                    </div>

                    {alert && (
                        <div className={`rounded-xl p-3 mb-4 text-sm ${alert.type === 'success' ? 'bg-green-900 bg-opacity-50 border border-green-500 text-green-200' : 'bg-red-900 bg-opacity-50 border border-red-500 text-red-200'}`}>
                            {alert.message}
                        </div>
                    )}

                    {/* Photo de profil */}
                    <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 20 }}>
                        <div className="avatar" style={{ width: 80, height: 80, cursor: 'pointer', position: 'relative' }} onClick={() => document.getElementById('photoInput').click()}>
                            {photoPreview
                                ? <img src={photoPreview} alt="Photo de profil" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                                : <span style={{ fontSize: 28 }}>+</span>
                            }
                        </div>
                    </div>
                    <input id="photoInput" type="file" accept="image/*" style={{ display: 'none' }} onChange={handlePhotoChange} />

                    <form onSubmit={handleSubmit} style={{ display: 'grid', gap: 12 }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                            <Field label="Prénom" id="firstName" field="firstName" placeholder="Nael" />
                            <Field label="Nom" id="lastName" field="lastName" placeholder="Khamallah" />
                        </div>
                        <Field label="Nom d'utilisateur" id="username" field="username" placeholder="nael_kml" />
                        <Field label="Email" id="email" type="email" field="email" placeholder="nael@carxmeet.fr" />
                        <Field label="Téléphone" id="phone" type="tel" field="phone" placeholder="+33 6 00 00 00 00" />

                        <div style={{ marginTop: 8 }}>
                            <p className="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-3">Réseaux sociaux</p>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                                <Field label="Instagram" id="instagram" field="instagram" placeholder="@instagram" />
                                <Field label="Snapchat" id="snapchat" field="snapchat" placeholder="@snapchat" />
                                <Field label="Twitter / X" id="twitter" field="twitter" placeholder="@twitter" />
                                <Field label="TikTok" id="tiktok" field="tiktok" placeholder="@tiktok" />
                            </div>
                        </div>

                        <button type="submit" disabled={saving} className="btn-primary w-full font-semibold py-3 px-6 rounded-xl text-sm mt-2">
                            {saving ? 'Enregistrement…' : 'Enregistrer'}
                        </button>
                    </form>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ProfileEditPage />);
</script>
</body>
</html>
