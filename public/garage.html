<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarXMeet — Mon garage</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/garage.css" />
</head>
<body class="p-4 min-h-screen">
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    function getToken() { return localStorage.getItem('jwt_token'); }
    function authHeaders(extra = {}) { return { 'Authorization': 'Bearer ' + getToken(), ...extra }; }
    function decodeToken() {
        try {
            const payload = JSON.parse(atob(getToken().split('.')[1]));
            return { username: payload.username || payload.sub };
        } catch { return null; }
    }

    function GaragePage() {
        const [vehicles, setVehicles] = useState([]);
        const [myUserId, setMyUserId] = useState(null);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);
        const [alert, setAlert] = useState(null);
        const [showForm, setShowForm] = useState(false);
        const [fields, setFields] = useState({ brand: '', model: '', year: '', engine: '', preparation: '', description: '' });
        const [coverFile, setCoverFile] = useState(null);
        const [galleryFiles, setGalleryFiles] = useState([]);

        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }
            const decoded = decodeToken();
            if (!decoded) { window.location.href = '/connexion.html'; return; }

            fetch(`/api/users?username=${decoded.username}`, { headers: authHeaders() })
                .then(r => {
                    if (r.status === 401) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return null; }
                    return r.json();
                })
                .then(data => {
                    if (!data) return;
                    const users = data['member'] || data['hydra:member'] || [];
                    const me = users.find(u => u.username === decoded.username);
                    if (!me) return;
                    setMyUserId(me.id);
                    return fetch(`/api/vehicles?ownerID=${me.id}`, { headers: authHeaders() }).then(r => r.json());
                })
                .then(data => {
                    if (data) setVehicles(data['member'] || data['hydra:member'] || []);
                })
                .catch(() => setAlert({ type: 'error', message: 'Impossible de charger le garage.' }))
                .finally(() => setLoading(false));
        }, []);

        const set = field => e => setFields(f => ({ ...f, [field]: e.target.value }));

        async function handleAddVehicle(e) {
            e.preventDefault();
            if (!fields.brand.trim() || !fields.model.trim()) {
                setAlert({ type: 'error', message: 'La marque et le modèle sont obligatoires.' });
                return;
            }
            setSaving(true);
            setAlert(null);
            try {
                const fd = new FormData();
                fd.append('ownerID', `/api/users/${myUserId}`);
                Object.entries(fields).forEach(([k, v]) => { if (v.trim()) fd.append(k, v.trim()); });
                if (coverFile) fd.append('coverPhoto', coverFile);
                galleryFiles.forEach(f => fd.append('galleryPhotos[]', f));

                const res = await fetch('/api/vehicles', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() },
                    body: fd
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                setVehicles(prev => [...prev, data]);
                setFields({ brand: '', model: '', year: '', engine: '', preparation: '', description: '' });
                setCoverFile(null);
                setGalleryFiles([]);
                setShowForm(false);
                setAlert({ type: 'success', message: 'Véhicule ajouté !' });
            } catch {
                setAlert({ type: 'error', message: 'Impossible d\'ajouter le véhicule.' });
            } finally {
                setSaving(false);
            }
        }

        async function handleDelete(vehicleId) {
            if (!confirm('Supprimer ce véhicule ?')) return;
            try {
                const res = await fetch(`/api/vehicles/${vehicleId}`, { method: 'DELETE', headers: authHeaders() });
                if (!res.ok) throw new Error();
                setVehicles(prev => prev.filter(v => v.id !== vehicleId));
                setAlert({ type: 'success', message: 'Véhicule supprimé.' });
            } catch {
                setAlert({ type: 'error', message: 'Impossible de supprimer le véhicule.' });
            }
        }

        return (
            <div className="max-w-4xl mx-auto">
                <div className="text-center mb-6 pt-6">
                    <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    <p className="text-white-header">La communauté des passionnés de voitures</p>
                </div>

                {alert && (
                    <div className={`rounded-xl p-3 mb-4 text-sm ${alert.type === 'success' ? 'bg-green-900 bg-opacity-50 border border-green-500 text-green-200' : 'bg-red-900 bg-opacity-50 border border-red-500 text-red-200'}`}>
                        {alert.message}
                    </div>
                )}

                {/* Mes véhicules */}
                <div className="card rounded-2xl p-5 shadow-2xl mb-4">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                        <h2 className="text-white font-bold text-lg m-0">Mon garage</h2>
                        <div style={{ display: 'flex', gap: 8 }}>
                            <button onClick={() => setShowForm(!showForm)} className="btn-dark px-3 py-2 rounded-xl text-sm font-medium">
                                {showForm ? 'Annuler' : '+ Ajouter un véhicule'}
                            </button>
                            <a href="/profile-edit.html" className="btn-outline inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                                Mon profil
                            </a>
                        </div>
                    </div>

                    {loading && (
                        <div style={{ display: 'grid', gap: 10 }}>
                            {[...Array(3)].map((_, i) => <div key={i} className="skeleton" style={{ height: 90 }} />)}
                        </div>
                    )}

                    {!loading && vehicles.length === 0 && !showForm && (
                        <div style={{ padding: 16, border: '1px dashed rgba(255,255,255,0.15)', borderRadius: 12, color: '#9ca3af', fontSize: 14 }}>
                            Aucun véhicule pour le moment.
                        </div>
                    )}

                    {!loading && vehicles.length > 0 && (
                        <div style={{ display: 'grid', gap: 10, marginBottom: showForm ? 16 : 0 }}>
                            {vehicles.map(v => (
                                <div key={v.id} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: 12, borderRadius: 12, border: '1px solid rgba(255,255,255,0.08)', background: 'rgba(255,255,255,0.04)' }}>
                                    <a href={`/vehicle-detail.html?id=${v.id}`} className="vehicle-media" style={{ textDecoration: 'none', display: 'block' }}>
                                        {v.imageBase64
                                            ? <img src={`data:image/jpeg;base64,${v.imageBase64}`} alt={`${v.brand} ${v.model}`} loading="lazy" />
                                            : <div style={{ width: '100%', height: '100%', display: 'grid', placeItems: 'center', color: '#6b7280', fontSize: 11 }}>📷</div>
                                        }
                                    </a>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <a href={`/vehicle-detail.html?id=${v.id}`} className="text-white font-bold text-sm" style={{ textDecoration: 'none' }}>
                                            {v.brand} {v.model} ({v.year})
                                        </a>
                                        <div style={{ fontSize: 12, color: '#9ca3af', marginTop: 4 }}>{v.engine} · {v.preparation}</div>
                                    </div>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'flex-end' }}>
                                        <a href={`/vehicle-edit.html?id=${v.id}`} className="btn-dark inline-block px-3 py-1 rounded-xl text-xs font-medium" style={{ textDecoration: 'none' }}>
                                            Modifier
                                        </a>
                                        <button onClick={() => handleDelete(v.id)} className="btn-danger px-3 py-1 rounded-xl text-xs font-medium">
                                            Supprimer
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Formulaire ajout */}
                    {showForm && (
                        <div style={{ borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: 16 }}>
                            <h3 className="text-white font-bold text-sm mb-4">Ajouter un véhicule</h3>
                            <form onSubmit={handleAddVehicle} style={{ display: 'grid', gap: 12 }}>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 10 }}>
                                    <div>
                                        <label className="input-label">Marque *</label>
                                        <input type="text" className="input-field" value={fields.brand} onChange={set('brand')} placeholder="BMW" />
                                    </div>
                                    <div>
                                        <label className="input-label">Modèle *</label>
                                        <input type="text" className="input-field" value={fields.model} onChange={set('model')} placeholder="M3" />
                                    </div>
                                    <div>
                                        <label className="input-label">Année</label>
                                        <input type="number" className="input-field" value={fields.year} onChange={set('year')} placeholder="2005" min="1900" max="2030" />
                                    </div>
                                    <div>
                                        <label className="input-label">Moteur</label>
                                        <input type="text" className="input-field" value={fields.engine} onChange={set('engine')} placeholder="3.2 S54 343ch" />
                                    </div>
                                    <div>
                                        <label className="input-label">Préparation</label>
                                        <input type="text" className="input-field" value={fields.preparation} onChange={set('preparation')} placeholder="Stage 2" />
                                    </div>
                                </div>
                                <div>
                                    <label className="input-label">Description</label>
                                    <textarea className="input-field" rows={3} value={fields.description} onChange={set('description')} placeholder="Décris ton véhicule..." style={{ resize: 'vertical' }} />
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                                    <div>
                                        <label className="input-label">Photo de couverture</label>
                                        <input type="file" accept="image/*" className="input-field" onChange={e => setCoverFile(e.target.files[0])} style={{ padding: '8px 12px' }} />
                                    </div>
                                    <div>
                                        <label className="input-label">Photos galerie</label>
                                        <input type="file" accept="image/*" multiple className="input-field" onChange={e => setGalleryFiles(Array.from(e.target.files))} style={{ padding: '8px 12px' }} />
                                    </div>
                                </div>
                                <button type="submit" disabled={saving} className="btn-primary font-semibold py-3 px-6 rounded-xl text-sm">
                                    {saving ? 'Ajout en cours…' : 'Ajouter le véhicule'}
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GaragePage />);
</script>
</body>
</html>
