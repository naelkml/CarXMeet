<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarXMeet — Véhicule</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/vehicle-detail.css" />
</head>
<body class="p-4 min-h-screen">
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    function getToken() { return localStorage.getItem('jwt_token'); }
    function authHeaders() { return { 'Authorization': 'Bearer ' + getToken() }; }
    function getVehicleIdFromUrl() { return new URLSearchParams(window.location.search).get('id'); }
    function decodeToken() {
        try {
            const payload = JSON.parse(atob(getToken().split('.')[1]));
            return { username: payload.username || payload.sub };
        } catch { return null; }
    }
    function iriToId(iri) {
        if (!iri) return null;
        if (typeof iri === 'object') return iri.id ?? null;
        const parts = String(iri).split('/');
        return parseInt(parts[parts.length - 1]) || null;
    }

    function Lightbox({ src, onClose }) {
        useEffect(() => {
            const h = e => { if (e.key === 'Escape') onClose(); };
            window.addEventListener('keydown', h);
            return () => window.removeEventListener('keydown', h);
        }, []);
        return (
            <div className="lightbox" onClick={onClose}>
                <img src={src} alt="Photo" onClick={e => e.stopPropagation()} />
            </div>
        );
    }

    function VehicleDetailPage() {
        const [vehicle, setVehicle] = useState(null);
        const [myUserId, setMyUserId] = useState(null);
        const [loading, setLoading] = useState(true);
        const [lightbox, setLightbox] = useState(null);
        const [alert, setAlert] = useState(null);
        const vehicleId = getVehicleIdFromUrl();

        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }
            const decoded = decodeToken();
            if (!decoded) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return; }

            fetch(`/api/vehicles/${vehicleId}`, { headers: authHeaders() })
                .then(r => {
                    if (r.status === 401) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return null; }
                    if (!r.ok) throw new Error();
                    return r.json();
                })
                .then(data => { if (data) setVehicle(data); })
                .catch(() => setAlert({ type: 'error', message: 'Impossible de charger le véhicule.' }))
                .finally(() => setLoading(false));

            fetch(`/api/users?username=${decoded.username}`, { headers: authHeaders() })
                .then(r => r.json())
                .then(data => {
                    const users = data['member'] ?? data['hydra:member'] ?? [];
                    const me = users.find(u => u.username === decoded.username);
                    if (me) setMyUserId(me.id);
                })
                .catch(() => {});
        }, [vehicleId]);

        if (loading) {
            return (
                <div className="max-w-4xl mx-auto pt-8">
                    <div className="skeleton" style={{ height: 300, borderRadius: 16, marginBottom: 12 }} />
                    <div className="skeleton" style={{ height: 120, borderRadius: 16 }} />
                </div>
            );
        }

        if (!vehicle) {
            return (
                <div className="max-w-4xl mx-auto pt-8">
                    <div className="rounded-xl p-4 bg-red-900 bg-opacity-50 border border-red-500 text-red-200 text-sm">
                        {alert?.message || 'Véhicule introuvable.'}
                    </div>
                </div>
            );
        }

        const photos = (vehicle.galleryPhotos || []).filter(p => p.imageBase64);
        const thumbPhotos = photos.slice(0, 2);
        const extraPhotos = photos.slice(2);

        return (
            <div className="max-w-4xl mx-auto">
                <div className="text-center mb-6 pt-6">
                    <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    <p className="text-white text-sm">La communauté des passionnés de voitures</p>
                </div>

                {/* Header */}
                <div className="card rounded-2xl p-5 shadow-2xl mb-4">
                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
                        <div>
                            <h2 className="text-white font-bold m-0" style={{ fontSize: 22 }}>
                                {vehicle.brand} {vehicle.model} ({vehicle.year})
                            </h2>
                            <div style={{ marginTop: 6, fontSize: 13, color: '#9ca3af' }}>
                                {[vehicle.engine, vehicle.preparation].filter(Boolean).join(' · ')}
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8 }}>
                            <a href="/garage.html" className="btn-outline inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                                ← Mon garage
                            </a>
                            {myUserId && iriToId(vehicle.userID) === myUserId && (
                                <a href={`/vehicle-edit.html?id=${vehicle.id}`} className="btn-dark inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                                    Modifier
                                </a>
                            )}
                        </div>
                    </div>
                </div>

                {/* Galerie */}
                {(vehicle.imageBase64 || thumbPhotos.length > 0) && (
                    <div className="mb-4">
                        <div className="media-grid">
                            {vehicle.imageBase64 && (
                                <div className="cover-img" style={{ overflow: 'hidden' }}>
                                    <img
                                        src={`data:image/jpeg;base64,${vehicle.imageBase64}`}
                                        alt={`${vehicle.brand} ${vehicle.model}`}
                                        onClick={() => setLightbox(`data:image/jpeg;base64,${vehicle.imageBase64}`)}
                                        loading="lazy"
                                    />
                                </div>
                            )}
                            {thumbPhotos.length > 0 && (
                                <div className="thumb-grid">
                                    {thumbPhotos.map((p, i) => (
                                        <div key={i} className="thumb-img" style={{ overflow: 'hidden' }}>
                                            <img
                                                src={`data:image/jpeg;base64,${p.imageBase64}`}
                                                alt={`Photo ${i + 1}`}
                                                onClick={() => setLightbox(`data:image/jpeg;base64,${p.imageBase64}`)}
                                                loading="lazy"
                                            />
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                )}

                {/* Description */}
                <div className="card rounded-2xl p-5 shadow-2xl mb-4">
                    {vehicle.description ? (
                        <p style={{ margin: 0, color: '#d1d5db', whiteSpace: 'pre-wrap', lineHeight: 1.7 }}>{vehicle.description}</p>
                    ) : (
                        <p style={{ margin: 0, color: '#9ca3af' }}>Aucune description.</p>
                    )}
                </div>

                {/* Plus de photos */}
                {extraPhotos.length > 0 && (
                    <div className="card rounded-2xl p-5 shadow-2xl mb-4">
                        <h3 className="text-white font-bold m-0 mb-4" style={{ fontSize: 16 }}>Plus de photos</h3>
                        <div className="gallery-grid">
                            {extraPhotos.map((p, i) => (
                                <div key={i} className="gallery-item" onClick={() => setLightbox(`data:image/jpeg;base64,${p.imageBase64}`)}>
                                    <img src={`data:image/jpeg;base64,${p.imageBase64}`} alt={`Photo ${i + 3}`} loading="lazy" />
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {lightbox && <Lightbox src={lightbox} onClose={() => setLightbox(null)} />}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VehicleDetailPage />);
</script>
</body>
</html>
