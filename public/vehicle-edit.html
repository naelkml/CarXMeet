<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarXMeet — Modifier véhicule</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/vehicle-edit.css" />
</head>
<body class="p-4 min-h-screen">
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    function getToken() { return localStorage.getItem('jwt_token'); }
    function authHeaders(extra = {}) { return { 'Authorization': 'Bearer ' + getToken(), ...extra }; }
    function getVehicleIdFromUrl() { return new URLSearchParams(window.location.search).get('id'); }

    function VehicleEditPage() {
        const [vehicle, setVehicle] = useState(null);
        const [fields, setFields] = useState({ brand: '', model: '', year: '', engine: '', preparation: '', description: '' });
        const [coverFile, setCoverFile] = useState(null);
        const [galleryFiles, setGalleryFiles] = useState([]);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);
        const [alert, setAlert] = useState(null);
        const vehicleId = getVehicleIdFromUrl();

        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }

            fetch(`/api/vehicles/${vehicleId}`, { headers: authHeaders() })
                .then(r => {
                    if (r.status === 401) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return null; }
                    if (!r.ok) throw new Error();
                    return r.json();
                })
                .then(data => {
                    if (!data) return;
                    setVehicle(data);
                    setFields({
                        brand: data.brand || '',
                        model: data.model || '',
                        year: data.year ? String(data.year) : '',
                        engine: data.engine || '',
                        preparation: data.preparation || '',
                        description: data.description || '',
                    });
                })
                .catch(() => setAlert({ type: 'error', message: 'Impossible de charger le véhicule.' }))
                .finally(() => setLoading(false));
        }, [vehicleId]);

        const set = field => e => setFields(f => ({ ...f, [field]: e.target.value }));

        async function handleSubmit(e) {
            e.preventDefault();
            setSaving(true);
            setAlert(null);
            try {
                const fd = new FormData();
                Object.entries(fields).forEach(([k, v]) => { if (v !== undefined) fd.append(k, v); });
                if (coverFile) fd.append('coverPhoto', coverFile);
                galleryFiles.forEach(f => fd.append('galleryPhotos[]', f));

                const res = await fetch(`/api/vehicles/${vehicleId}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken(), 'X-HTTP-Method-Override': 'PATCH' },
                    body: fd
                });
                if (!res.ok) throw new Error();
                setAlert({ type: 'success', message: 'Véhicule mis à jour !' });
                setCoverFile(null);
                setGalleryFiles([]);
            } catch {
                setAlert({ type: 'error', message: 'Impossible de mettre à jour le véhicule.' });
            } finally {
                setSaving(false);
            }
        }

        async function handleDeletePhoto(photoId) {
            if (!confirm('Supprimer cette photo ?')) return;
            try {
                await fetch(`/api/vehicle_photos/${photoId}`, { method: 'DELETE', headers: authHeaders() });
                setVehicle(prev => ({
                    ...prev,
                    galleryPhotos: (prev.galleryPhotos || []).filter(p => p.id !== photoId)
                }));
                setAlert({ type: 'success', message: 'Photo supprimée.' });
            } catch {
                setAlert({ type: 'error', message: 'Impossible de supprimer la photo.' });
            }
        }

        if (loading) {
            return (
                <div className="max-w-2xl mx-auto pt-8">
                    <div className="skeleton" style={{ height: 400, borderRadius: 16 }} />
                </div>
            );
        }

        const galleryPhotos = vehicle?.galleryPhotos || [];

        return (
            <div className="max-w-2xl mx-auto">
                <div className="text-center mb-6 pt-6">
                    <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    <p className="text-gray-400 text-sm">La communauté des passionnés de voitures</p>
                </div>

                <div className="card rounded-2xl p-6 shadow-2xl">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
                        <h2 className="text-white font-bold text-lg m-0">Modifier véhicule</h2>
                        <a href={`/vehicle-detail.html?id=${vehicleId}`} className="btn-outline inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                            ← Retour
                        </a>
                    </div>

                    {alert && (
                        <div className={`rounded-xl p-3 mb-4 text-sm ${alert.type === 'success' ? 'bg-green-900 bg-opacity-50 border border-green-500 text-green-200' : 'bg-red-900 bg-opacity-50 border border-red-500 text-red-200'}`}>
                            {alert.message}
                        </div>
                    )}

                    {/* Cover actuelle */}
                    {vehicle?.imageBase64 && (
                        <div style={{ marginBottom: 16, borderRadius: 12, overflow: 'hidden', height: 180 }}>
                            <img src={`data:image/jpeg;base64,${vehicle.imageBase64}`} alt="Cover" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                        </div>
                    )}

                    {/* Galerie actuelle */}
                    {galleryPhotos.length > 0 && (
                        <div style={{ marginBottom: 16 }}>
                            <p className="input-label mb-2">Galerie ({galleryPhotos.length}/5)</p>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(130px, 1fr))', gap: 8 }}>
                                {galleryPhotos.map(p => (
                                    <div key={p.id} className="gallery-tile">
                                        <div className="gallery-tile-img">
                                            {p.imageBase64 && (
                                                <img src={`data:image/jpeg;base64,${p.imageBase64}`} alt="Photo" />
                                            )}
                                        </div>
                                        <div className="gallery-tile-actions">
                                            <button onClick={() => handleDeletePhoto(p.id)} className="btn-danger w-full py-1 rounded-lg text-xs font-medium" style={{ width: '100%' }}>
                                                Supprimer
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <form onSubmit={handleSubmit} style={{ display: 'grid', gap: 12 }}>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 10 }}>
                            <div>
                                <label className="input-label">Marque</label>
                                <input type="text" className="input-field" value={fields.brand} onChange={set('brand')} placeholder="BMW" />
                            </div>
                            <div>
                                <label className="input-label">Modèle</label>
                                <input type="text" className="input-field" value={fields.model} onChange={set('model')} placeholder="M3" />
                            </div>
                            <div>
                                <label className="input-label">Année</label>
                                <input type="number" className="input-field" value={fields.year} onChange={set('year')} placeholder="2005" />
                            </div>
                            <div>
                                <label className="input-label">Moteur</label>
                                <input type="text" className="input-field" value={fields.engine} onChange={set('engine')} placeholder="3.2 S54" />
                            </div>
                            <div>
                                <label className="input-label">Préparation</label>
                                <input type="text" className="input-field" value={fields.preparation} onChange={set('preparation')} placeholder="Stage 2" />
                            </div>
                        </div>
                        <div>
                            <label className="input-label">Description</label>
                            <textarea className="input-field" rows={3} value={fields.description} onChange={set('description')} style={{ resize: 'vertical' }} />
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                            <div>
                                <label className="input-label">Nouvelle photo de couverture</label>
                                <input type="file" accept="image/*" className="input-field" onChange={e => setCoverFile(e.target.files[0])} style={{ padding: '8px 12px' }} />
                            </div>
                            <div>
                                <label className="input-label">Ajouter des photos galerie</label>
                                <input type="file" accept="image/*" multiple className="input-field" onChange={e => setGalleryFiles(Array.from(e.target.files))} style={{ padding: '8px 12px' }} />
                            </div>
                        </div>
                        <button type="submit" disabled={saving} className="btn-primary w-full font-semibold py-3 px-6 rounded-xl text-sm">
                            {saving ? 'Enregistrement…' : 'Enregistrer'}
                        </button>
                    </form>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VehicleEditPage />);
</script>
</body>
</html>
