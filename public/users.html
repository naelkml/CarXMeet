<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarXMeet — Utilisateurs</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/users.css" />
</head>
<body class="p-4 min-h-screen">
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    function getToken() { return localStorage.getItem('jwt_token'); }
    function authHeaders(extra = {}) { return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', ...extra }; }
    function decodeToken() {
        try {
            const payload = JSON.parse(atob(getToken().split('.')[1]));
            return { username: payload.username || payload.sub };
        } catch { return null; }
    }

    function Avatar({ user, size = 44 }) {
        const initials = (user?.username || '?').substring(0, 2).toUpperCase();
        if (user?.profileImageBase64) {
            return (
                <div className="avatar" style={{ width: size, height: size }}>
                    <img src={`data:image/jpeg;base64,${user.profileImageBase64}`} alt={user.username} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                </div>
            );
        }
        return <div className="avatar" style={{ width: size, height: size, fontSize: size * 0.35 }}>{initials}</div>;
    }

    function UsersPage() {
        const [users, setUsers] = useState([]);
        const [friendships, setFriendships] = useState([]);
        const [myUserId, setMyUserId] = useState(null);
        const [loading, setLoading] = useState(true);
        const [alert, setAlert] = useState(null);
        const [search, setSearch] = useState('');

        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }
            const decoded = decodeToken();
            if (!decoded) { window.location.href = '/connexion.html'; return; }

            fetch(`/api/users?username=${decoded.username}`, { headers: authHeaders() })
                .then(r => {
                    if (r.status === 401) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return null; }
                    return r.json();
                })
                .then(data => {
                    if (!data) return;
                    const meList = data['member'] || data['hydra:member'] || [];
                    const me = meList.find(u => u.username === decoded.username);
                    if (!me) return;
                    setMyUserId(me.id);

                    return Promise.all([
                        fetch('/api/users', { headers: authHeaders() }).then(r => r.json()),
                        fetch(`/api/friendships?requesterId=${me.id}`, { headers: authHeaders() }).then(r => r.json()),
                        fetch(`/api/friendships?receiverId=${me.id}`,  { headers: authHeaders() }).then(r => r.json()),
                    ]).then(([usersData, friendsData1, friendsData2]) => {
                        setUsers(usersData['member'] ?? usersData['hydra:member'] ?? []);
                        const l1 = friendsData1['member'] ?? friendsData1['hydra:member'] ?? [];
                        const l2 = friendsData2['member'] ?? friendsData2['hydra:member'] ?? [];
                        setFriendships([...l1, ...l2]);
                    });
                })
                .catch(() => setAlert({ type: 'error', message: 'Impossible de charger les utilisateurs.' }))
                .finally(() => setLoading(false));
        }, []);

        function iriToId(val) {
            if (!val) return null;
            if (typeof val === 'object') return val?.id ?? null;
            if (typeof val === 'number') return val;
            const m = String(val).match(/(\d+)$/);
            return m ? parseInt(m[1], 10) : null;
        }

        function getFriendship(userId) {
            return friendships.find(f => {
                return iriToId(f.receiverId) === userId || iriToId(f.requesterId) === userId;
            });
        }

        async function handleAdd(userId) {
            try {
                const res = await fetch('/api/friendships', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({
                        requesterId: `/api/users/${myUserId}`,
                        receiverId: `/api/users/${userId}`,
                    })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                setFriendships(prev => [...prev, data]);
                setAlert({ type: 'success', message: 'Ami ajouté !' });
            } catch { setAlert({ type: 'error', message: 'Impossible d\'envoyer la demande.' }); }
        }

        async function handleRemove(friendshipId) {
            if (!confirm('Supprimer cet ami ?')) return;
            try {
                const res = await fetch(`/api/friendships/${friendshipId}`, { method: 'DELETE', headers: authHeaders() });
                if (!res.ok) throw new Error();
                setFriendships(prev => prev.filter(f => f.id !== friendshipId));
                setAlert({ type: 'success', message: 'Ami retiré.' });
            } catch { setAlert({ type: 'error', message: 'Impossible de retirer cet ami.' }); }
        }

        return (
            <div className="max-w-3xl mx-auto">
                <div className="text-center mb-6 pt-6">
                    <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    <p className="text-gray-400 text-sm">La communauté des passionnés de voitures</p>
                </div>

                <div className="card rounded-2xl p-5 shadow-2xl">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                        <h2 className="text-white font-bold text-lg m-0">Utilisateurs</h2>
                        <a href="/home.html" className="btn-outline inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                            ← Retour accueil
                        </a>
                    </div>

                    <input
                        type="text"
                        placeholder="Rechercher un utilisateur…"
                        value={search}
                        onChange={e => setSearch(e.target.value)}
                        className="input-field w-full rounded-xl mb-4"
                        style={{ background: 'rgba(255,255,255,0.07)', border: '1px solid rgba(255,255,255,0.15)', color: '#fff', padding: '8px 12px', fontSize: 14, outline: 'none' }}
                    />

                    {alert && (
                        <div className={`rounded-xl p-3 mb-4 text-sm ${alert.type === 'success' ? 'bg-green-900 bg-opacity-50 border border-green-500 text-green-200' : 'bg-red-900 bg-opacity-50 border border-red-500 text-red-200'}`}>
                            {alert.message}
                        </div>
                    )}

                    {loading && (
                        <div style={{ display: 'grid', gap: 10 }}>
                            {[...Array(5)].map((_, i) => <div key={i} className="skeleton" style={{ height: 64 }} />)}
                        </div>
                    )}

                    {!loading && users.length === 0 && (
                        <div style={{ padding: 16, border: '1px dashed rgba(255,255,255,0.15)', borderRadius: 12, color: '#9ca3af', fontSize: 14 }}>
                            Aucun utilisateur.
                        </div>
                    )}

                    {!loading && users.length > 0 && (
                        <div style={{ display: 'grid', gap: 10 }}>
                            {users.filter(u => {
                                const q = search.trim().toLowerCase();
                                if (!q) return true;
                                return (u.username || '').toLowerCase().includes(q)
                                    || (u.firstName || '').toLowerCase().includes(q)
                                    || (u.lastName || '').toLowerCase().includes(q);
                            }).map(u => {
                                const isMe = u.id === myUserId;
                                const friendship = getFriendship(u.id);
                                const isFriend = !!friendship;
                                const isPending = false;
                                return (
                                    <div key={u.id} className="inner-card rounded-xl p-3" style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                        <Avatar user={u} size={44} />
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <a href={`/user-profile.html?id=${u.id}`} className="text-white font-semibold text-sm" style={{ textDecoration: 'none' }}>
                                                {u.username}
                                            </a>
                                            <div style={{ fontSize: 12, color: '#9ca3af' }}>{u.firstName} {u.lastName}</div>
                                        </div>
                                        {!isMe && (
                                            isFriend ? (
                                                <button onClick={() => handleRemove(friendship.id)} className="btn-danger px-3 py-1 rounded-xl text-xs font-medium">
                                                    Retirer
                                                </button>
                                            ) : isPending ? (
                                                <span style={{ fontSize: 12, color: '#9ca3af' }}>En attente</span>
                                            ) : (
                                                <button onClick={() => handleAdd(u.id)} className="btn-dark px-3 py-1 rounded-xl text-xs font-medium">
                                                    Ajouter en ami
                                                </button>
                                            )
                                        )}
                                        {isMe && <span style={{ fontSize: 12, color: '#9ca3af' }}>Moi</span>}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<UsersPage />);
</script>
</body>
</html>
