<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarXMeet — Événement</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/event-detail.css" />
</head>
<body class="p-4 min-h-screen">
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // ─── Utilitaires ──────────────────────────────────────────────────────────
    function getToken() { return localStorage.getItem('jwt_token'); }
    function authHeaders(extra = {}) {
        return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', ...extra };
    }
    function getEventIdFromUrl() {
        return new URLSearchParams(window.location.search).get('id');
    }
    function decodeToken() {
        try {
            const payload = JSON.parse(atob(getToken().split('.')[1]));
            return { username: payload.username || payload.sub, roles: payload.roles || [] };
        } catch { return null; }
    }

    // ─── Composant : Avatar ───────────────────────────────────────────────────
    function Avatar({ user, size = 40 }) {
        if (!user) return <div className="avatar skeleton" style={{ width: size, height: size }} />;
        const initials = (user.username || '?').substring(0, 2).toUpperCase();
        if (user.profileImageBase64) {
            return (
                <div className="avatar" style={{ width: size, height: size }}>
                    <img src={`data:image/jpeg;base64,${user.profileImageBase64}`} alt={user.username} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                </div>
            );
        }
        return <div className="avatar" style={{ width: size, height: size, fontSize: size * 0.35 }}>{initials}</div>;
    }

    // ─── Composant : UserBadge ────────────────────────────────────────────────
    function UserBadge({ user, isMe, isFriend, isPending, onAddFriend, onRemoveFriend }) {
        return (
            <div className="inner-card rounded-xl p-3" style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <Avatar user={user} size={40} />
                <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="text-white font-medium text-sm">{user?.username || '…'}</div>
                    <div style={{ fontSize: 12, color: '#9ca3af' }}>{user?.firstName} {user?.lastName}</div>
                </div>
                {!isMe && (
                    isFriend
                        ? <button onClick={onRemoveFriend} className="btn-danger px-3 py-1 rounded-xl text-xs font-medium">Retirer</button>
                        : isPending
                            ? <span style={{ fontSize: 12, color: '#9ca3af' }}>Demande envoyée</span>
                            : <button onClick={onAddFriend} className="btn-dark px-3 py-1 rounded-xl text-xs font-medium">Ajouter en ami</button>
                )}
                {isMe && <span style={{ fontSize: 12, color: '#9ca3af' }}>Moi</span>}
            </div>
        );
    }

    // ─── Composant : Lightbox ─────────────────────────────────────────────────
    function Lightbox({ src, onClose }) {
        useEffect(() => {
            const handler = e => { if (e.key === 'Escape') onClose(); };
            window.addEventListener('keydown', handler);
            return () => window.removeEventListener('keydown', handler);
        }, []);
        return (
            <div className="lightbox" onClick={onClose}>
                <img src={src} alt="Photo" onClick={e => e.stopPropagation()} />
            </div>
        );
    }

    // ─── Composant : AlertBox ─────────────────────────────────────────────────
    function AlertBox({ type, message, onClose }) {
        const isSuccess = type === 'success';
        return (
            <div className={`rounded-xl p-4 mb-4 ${isSuccess ? 'bg-green-900 bg-opacity-50 border border-green-500' : 'bg-red-900 bg-opacity-50 border border-red-500'}`}
                 style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <p className={`text-sm m-0 ${isSuccess ? 'text-green-200' : 'text-red-200'}`}>{message}</p>
                {onClose && <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#9ca3af', cursor: 'pointer', fontSize: 18 }}>×</button>}
            </div>
        );
    }

    // ─── Page principale ──────────────────────────────────────────────────────
    function EventDetailPage() {
        const [event, setEvent]                   = useState(null);
        const [loading, setLoading]               = useState(true);
        const [alert, setAlert]                   = useState(null);
        const [lightbox, setLightbox]             = useState(null);
        const [myParticipation, setMyParticipation] = useState(null);
        const [myRating, setMyRating]             = useState(null);
        const [selectedRating, setSelectedRating] = useState(1);
        const [friendships, setFriendships]       = useState([]);
        const [myUserId, setMyUserId]             = useState(null);
        const [myUsername, setMyUsername]         = useState('');
        const [roles, setRoles]                   = useState([]);
        const [convoyMemberships, setConvoyMemberships] = useState([]);
        const [participants, setParticipants]     = useState([]);
        const [convoys, setConvoys]               = useState([]);

        const eventId = getEventIdFromUrl();

        // ── Auth ──────────────────────────────────────────────────────────────
        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }
            const decoded = decodeToken();
            if (!decoded) { window.location.href = '/connexion.html'; return; }
            setMyUsername(decoded.username);
            setRoles(decoded.roles || []);
        }, []);

        // ── Fetch données ─────────────────────────────────────────────────────
        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }
            const decoded = decodeToken();
            if (!decoded) { window.location.href = '/connexion.html'; return; }
            setMyUsername(decoded.username);
            setRoles(decoded.roles || []);

            if (!eventId) return;

            // 1 — Fetch event
            fetch(`/api/events/${eventId}`, { headers: { 'Authorization': 'Bearer ' + token } })
                .then(res => {
                    if (res.status === 401) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return null; }
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(data => { if (data) setEvent(data); })
                .catch(() => setAlert({ type: 'error', message: "Impossible de charger l'événement." }))
                .finally(() => setLoading(false));

            // 2 — Fetch user puis participations/ratings/amitiés
            fetch(`/api/users?username=${decoded.username}`, { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(data => {
                    const users = data['member'] || data['hydra:member'] || [];
                    const me = users.find(u => u.username === decoded.username);
                    if (!me) return;

                    setMyUserId(me.id);  // ← on set l'id ici directement

                    // Participations
                    fetch(`/api/participations?userID=${me.id}&eventID=${eventId}`, { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(r => r.json())
                        .then(d => {
                            const list = d['member'] || d['hydra:member'] || [];
                            if (list.length > 0) setMyParticipation(list[0]);
                        });

                    // Ratings
                    fetch(`/api/event_ratings?userID=${me.id}&eventID=${eventId}`, { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(r => r.json())
                        .then(d => {
                            const list = d['member'] || d['hydra:member'] || [];
                            if (list.length > 0) { setMyRating(list[0]); setSelectedRating(list[0].rating); }
                        });

                    // Amitiés
                    fetch(`/api/friendships?requesterId=${me.id}`, { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(r => r.json())
                        .then(d => setFriendships(d['member'] || d['hydra:member'] || []));

                    // Participants de l'événement
                    fetch(`/api/participations?eventID=${eventId}`, { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(r => r.json())
                        .then(d => setParticipants(d['member'] || d['hydra:member'] || []));

                    // Convois de l'événement
                    fetch(`/api/convoys?eventID=${eventId}`, { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(r => r.json())
                        .then(d => setConvoys(d['member'] || d['hydra:member'] || []));
                });

            // 3 — Convoy memberships
            fetch('/api/convoy_participations', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(d => setConvoyMemberships(d['member'] || d['hydra:member'] || []));

        }, [eventId]);

        // ── Helpers ───────────────────────────────────────────────────────────
        const isEventManager = roles.includes('ROLE_EVENT_MANAGER');

        function friendshipWith(userId) {
            return friendships.find(f => {
                const rid = typeof f.receiverId === 'object' ? f.receiverId?.id : f.receiverId;
                const req = typeof f.requesterId === 'object' ? f.requesterId?.id : f.requesterId;
                return rid === userId || req === userId;
            });
        }

        function isFriendWith(userId) {
            return friendshipWith(userId)?.status === 'accepted';
        }

        function isPendingWith(userId) {
            return friendshipWith(userId)?.status === 'pending';
        }

        function isConvoyMember(convoyId) {
            return convoyMemberships.some(m => {
                const cid = typeof m.convoyID === 'object' ? m.convoyID?.id : m.convoyID;
                const uid = typeof m.userID === 'object' ? m.userID?.id : m.userID;
                return cid === convoyId && uid === myUserId;
            });
        }

        function getConvoyMembershipId(convoyId) {
            const m = convoyMemberships.find(m => {
                const cid = typeof m.convoyID === 'object' ? m.convoyID?.id : m.convoyID;
                const uid = typeof m.userID === 'object' ? m.userID?.id : m.userID;
                return cid === convoyId && uid === myUserId;
            });
            return m?.id;
        }

        // ── Actions ───────────────────────────────────────────────────────────
        async function handleParticipate() {
            if (!myUserId) return;
            try {
                const res = await fetch('/api/participations', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({
                        userID: `/api/users/${myUserId}`,
                        eventID: `/api/events/${eventId}`,
                        joinedAt: new Date().toISOString()
                    })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                setMyParticipation(data);
                setAlert({ type: 'success', message: 'Tu participes maintenant à cet événement !' });
                refreshParticipants();
                refreshEvent();
            } catch { setAlert({ type: 'error', message: 'Impossible de rejoindre l\'événement.' }); }
        }

        async function handleLeave() {
            if (!myParticipation) return;
            if (!confirm('Quitter cet événement ?')) return;
            try {
                await fetch(`/api/participations/${myParticipation.id}`, { method: 'DELETE', headers: authHeaders() });
                setMyParticipation(null);
                setAlert({ type: 'success', message: 'Tu as quitté l\'événement.' });
                refreshParticipants();
                refreshEvent();
            } catch { setAlert({ type: 'error', message: 'Impossible de quitter l\'événement.' }); }
        }

        async function handleRate() {
            if (!myUserId) return;
            try {
                if (myRating) {
                    const res = await fetch(`/api/event_ratings/${myRating.id}`, {
                        method: 'PATCH',
                        headers: { ...authHeaders(), 'Content-Type': 'application/merge-patch+json' },
                        body: JSON.stringify({ rating: selectedRating })
                    });
                    if (!res.ok) throw new Error();
                    setMyRating({ ...myRating, rating: selectedRating });
                    setAlert({ type: 'success', message: 'Note mise à jour !' });
                } else {
                    const res = await fetch('/api/event_ratings', {
                        method: 'POST',
                        headers: authHeaders(),
                        body: JSON.stringify({
                            eventID: `/api/events/${eventId}`,
                            userID: `/api/users/${myUserId}`,
                            rating: selectedRating
                        })
                    });
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    setMyRating(data);
                    setAlert({ type: 'success', message: 'Note envoyée !' });
                }
                refreshEvent();
            } catch { setAlert({ type: 'error', message: 'Impossible d\'envoyer la note.' }); }
        }

        async function handleAddFriend(userId) {
            if (!myUserId || !userId) return;
            try {
                const res = await fetch('/api/friendships', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({
                        requesterId: `/api/users/${myUserId}`,
                        receiverId: `/api/users/${userId}`,
                        status: 'pending'
                    })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                setFriendships(prev => [...prev, data]);
                setAlert({ type: 'success', message: 'Demande d\'amitié envoyée !' });
            } catch { setAlert({ type: 'error', message: 'Impossible d\'envoyer la demande.' }); }
        }

        async function handleRemoveFriend(userId) {
            if (!confirm('Supprimer cet ami ?')) return;
            const f = friendshipWith(userId);
            if (!f) return;
            try {
                await fetch(`/api/friendships/${f.id}`, { method: 'DELETE', headers: authHeaders() });
                setFriendships(prev => prev.filter(x => x.id !== f.id));
                setAlert({ type: 'success', message: 'Ami retiré.' });
            } catch { setAlert({ type: 'error', message: 'Impossible de retirer cet ami.' }); }
        }

        async function handleJoinConvoy(convoyId) {
            if (!myUserId) return;
            if (!confirm('Rejoindre ce convoi ?')) return;
            try {
                const res = await fetch('/api/convoy_participations', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({
                        convoyID: `/api/convoys/${convoyId}`,
                        userID: `/api/users/${myUserId}`
                    })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                setConvoyMemberships(prev => [...prev, data]);
                setAlert({ type: 'success', message: 'Tu as rejoint le convoi !' });
                refreshConvoys();
            } catch { setAlert({ type: 'error', message: 'Impossible de rejoindre le convoi.' }); }
        }

        async function handleLeaveConvoy(convoyId) {
            if (!confirm('Quitter ce convoi ?')) return;
            const membershipId = getConvoyMembershipId(convoyId);
            if (!membershipId) return;
            try {
                await fetch(`/api/convoy_participations/${membershipId}`, { method: 'DELETE', headers: authHeaders() });
                setConvoyMemberships(prev => prev.filter(m => m.id !== membershipId));
                setAlert({ type: 'success', message: 'Tu as quitté le convoi.' });
                refreshConvoys();
            } catch { setAlert({ type: 'error', message: 'Impossible de quitter le convoi.' }); }
        }

        function refreshEvent() {
            fetch(`/api/events/${eventId}`, { headers: { 'Authorization': 'Bearer ' + getToken() } })
                .then(r => r.json())
                .then(data => setEvent(data))
                .catch(() => {});
        }

        function refreshParticipants() {
            fetch(`/api/participations?eventID=${eventId}`, { headers: { 'Authorization': 'Bearer ' + getToken() } })
                .then(r => r.json())
                .then(d => setParticipants(d['member'] || d['hydra:member'] || []))
                .catch(() => {});
        }

        function refreshConvoys() {
            fetch(`/api/convoys?eventID=${eventId}`, { headers: { 'Authorization': 'Bearer ' + getToken() } })
                .then(r => r.json())
                .then(d => setConvoys(d['member'] || d['hydra:member'] || []))
                .catch(() => {});
        }

        // ── Render ────────────────────────────────────────────────────────────
        if (loading) {
            return (
                <div className="max-w-4xl mx-auto pt-6">
                    <div className="text-center mb-8">
                        <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    </div>
                    <div style={{ display: 'grid', gap: 12 }}>
                        <div className="skeleton" style={{ height: 60 }} />
                        <div className="skeleton" style={{ height: 280 }} />
                        <div className="skeleton" style={{ height: 200 }} />
                    </div>
                </div>
            );
        }

        if (!event) {
            return (
                <div className="max-w-4xl mx-auto pt-6">
                    <AlertBox type="error" message="Événement introuvable." />
                </div>
            );
        }

        const photos = (event.galleryPhotos || []).filter(p => p.imageBase64);
        const regionId = event.regionID?.id;

        return (
            <div className="max-w-4xl mx-auto">
                {/* Logo */}
                <div className="text-center mb-6 pt-6">
                    <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    <p className="text-gray-400 text-sm">La communauté des passionnés de voitures</p>
                </div>

                {alert && <AlertBox type={alert.type} message={alert.message} onClose={() => setAlert(null)} />}

                {/* Header */}
                <div className="card rounded-2xl p-5 shadow-2xl mb-4">
                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
                        <div>
                            <h2 className="text-white font-bold m-0" style={{ fontSize: 22 }}>{event.title}</h2>
                            <div style={{ marginTop: 6, fontSize: 13, color: '#9ca3af' }}>
                                {[event.Date, event.location, event.type, event.regionID?.name].filter(Boolean).join(' · ')}
                            </div>
                            <div style={{ marginTop: 6, fontSize: 13, color: '#9ca3af' }}>
                                Note moyenne :&nbsp;
                                <strong style={{ color: '#fbbf24' }}>{event.ratingAverage || '0'}/5</strong>
                                {myRating && <> · Ma note : <strong style={{ color: '#fbbf24' }}>{myRating.rating}/5</strong></>}
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                            <a
                                href={regionId ? `/events.html?region=${regionId}` : '/events.html'}
                                className="btn-outline inline-block px-3 py-2 rounded-xl text-sm font-medium"
                                style={{ textDecoration: 'none' }}
                            >
                                ← Retour liste
                            </a>
                        </div>
                    </div>
                </div>

                {/* Galerie */}
                {(event.imageBase64 || photos.length > 0) && (
                    <div className="mb-4">
                        <div className="media-grid">
                            {event.imageBase64 && (
                                <div className="cover-img" style={{ overflow: 'hidden', borderRadius: 0 }}>
                                    <img
                                        src={`data:image/jpeg;base64,${event.imageBase64}`}
                                        alt={`Cover ${event.title}`}
                                        style={{ width: '100%', height: '100%', objectFit: 'cover', cursor: 'pointer' }}
                                        onClick={() => setLightbox(`data:image/jpeg;base64,${event.imageBase64}`)}
                                        loading="lazy"
                                    />
                                </div>
                            )}
                            {photos.slice(0, 2).length > 0 && (
                                <div className="thumb-grid">
                                    {photos.slice(0, 2).map((p, i) => (
                                        <div key={i} className="thumb-img" style={{ overflow: 'hidden' }}>
                                            <img
                                                src={`data:image/jpeg;base64,${p.imageBase64}`}
                                                alt={`Photo ${i + 1}`}
                                                style={{ width: '100%', height: '100%', objectFit: 'cover', cursor: 'pointer' }}
                                                onClick={() => setLightbox(`data:image/jpeg;base64,${p.imageBase64}`)}
                                                loading="lazy"
                                            />
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                )}

                {/* Description */}
                <div className="card rounded-2xl p-6 shadow-2xl mb-4">
                    <p style={{ margin: 0, color: '#d1d5db', whiteSpace: 'pre-wrap', lineHeight: 1.7 }}>{event.description}</p>
                </div>

                {/* Participants */}
                <div className="card rounded-2xl p-6 shadow-2xl mb-4">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                        <h3 className="text-white font-bold m-0" style={{ fontSize: 17 }}>
                            Participants <span style={{ color: '#9ca3af', fontWeight: 400, fontSize: 14 }}>({participants.length})</span>
                        </h3>
                        {myParticipation
                            ? <button onClick={handleLeave} className="btn-danger px-3 py-2 rounded-xl text-sm font-medium">Quitter</button>
                            : <button onClick={handleParticipate} className="btn-success px-3 py-2 rounded-xl text-sm font-medium">Participer</button>
                        }
                    </div>

                    {participants.length === 0 ? (
                        <div style={{ padding: 12, border: '1px dashed rgba(255,255,255,0.15)', borderRadius: 12, color: '#9ca3af', fontSize: 14 }}>
                            Personne ne participe pour l'instant.
                        </div>
                    ) : (
                        <div style={{ display: 'grid', gap: 8 }}>
                            {participants.map((p, i) => {
                                const user = typeof p.userID === 'object' ? p.userID : null;
                                const userId = user?.id;
                                const isMe = user?.username === myUsername;
                                return (
                                    <UserBadge
                                        key={p.id || i}
                                        user={user}
                                        isMe={isMe}
                                        isFriend={isFriendWith(userId)}
                                        isPending={isPendingWith(userId)}
                                        onAddFriend={() => handleAddFriend(userId)}
                                        onRemoveFriend={() => handleRemoveFriend(userId)}
                                    />
                                );
                            })}
                        </div>
                    )}
                </div>

                {/* Notation */}
                <div className="card rounded-2xl p-6 shadow-2xl mb-4">
                    <h3 className="text-white font-bold m-0 mb-4" style={{ fontSize: 17 }}>Noter l'événement</h3>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
                        <select
                            className="select-field"
                            value={selectedRating}
                            onChange={e => setSelectedRating(parseInt(e.target.value))}
                        >
                            {[1, 2, 3, 4, 5].map(i => (
                                <option key={i} value={i}>{i} ⭐</option>
                            ))}
                        </select>
                        <button onClick={handleRate} className="btn-dark px-4 py-2 rounded-xl text-sm font-medium">
                            {myRating ? 'Mettre à jour' : 'Envoyer'}
                        </button>
                        {myRating && (
                            <span style={{ fontSize: 13, color: '#9ca3af' }}>
                                Ta note actuelle : <strong style={{ color: '#fbbf24' }}>{myRating.rating}/5</strong>
                            </span>
                        )}
                    </div>
                </div>

                {/* Convois */}
                <div className="card rounded-2xl p-6 shadow-2xl mb-4">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                        <h3 className="text-white font-bold m-0" style={{ fontSize: 17 }}>Convois</h3>
                        <a href={`/convoy-new.html?event=${eventId}`} className="btn-dark inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                            + Créer un convoi
                        </a>
                    </div>

                    {convoys.length === 0 ? (
                        <div style={{ padding: 12, border: '1px dashed rgba(255,255,255,0.15)', borderRadius: 12, color: '#9ca3af', fontSize: 14 }}>
                            Aucun convoi pour le moment.
                        </div>
                    ) : (
                        <div style={{ display: 'grid', gap: 12 }}>
                            {convoys.map((c, i) => {
                                const isMember = isConvoyMember(c.id);
                                const members = c.memberships || [];
                                return (
                                    <div key={c.id || i} className="inner-card rounded-2xl p-4">
                                        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12 }}>
                                            <div>
                                                <div className="text-white font-bold" style={{ fontSize: 15 }}>
                                                    📍 Départ : {c.departureLocation}
                                                </div>
                                                <div style={{ marginTop: 5, fontSize: 13, color: '#9ca3af' }}>
                                                    {[c.departureDate, c.departureTime].filter(Boolean).join(' · ')}
                                                </div>
                                            </div>
                                            {isMember
                                                ? <button onClick={() => handleLeaveConvoy(c.id)} className="btn-danger px-3 py-2 rounded-xl text-sm font-medium">Quitter</button>
                                                : <button onClick={() => handleJoinConvoy(c.id)} className="btn-success px-3 py-2 rounded-xl text-sm font-medium">Rejoindre</button>
                                            }
                                        </div>

                                        {members.length > 0 && (
                                            <div style={{ marginTop: 12 }}>
                                                <div style={{ fontSize: 13, color: '#9ca3af', marginBottom: 8 }}>Participants ({members.length})</div>
                                                <div style={{ display: 'grid', gap: 8 }}>
                                                    {members.map((m, j) => {
                                                        const user = typeof m.userID === 'object' ? m.userID : null;
                                                        const userId = user?.id;
                                                        const isMe = user?.username === myUsername;
                                                        return (
                                                            <UserBadge
                                                                key={m.id || j}
                                                                user={user}
                                                                isMe={isMe}
                                                                isFriend={isFriendWith(userId)}
                                                                isPending={isPendingWith(userId)}
                                                                onAddFriend={() => handleAddFriend(userId)}
                                                                onRemoveFriend={() => handleRemoveFriend(userId)}
                                                            />
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>

                {/* Plus de photos */}
                {photos.length > 2 && (
                    <div className="card rounded-2xl p-6 shadow-2xl mb-4">
                        <h3 className="text-white font-bold m-0 mb-4" style={{ fontSize: 17 }}>Plus de photos</h3>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))', gap: 8 }}>
                            {photos.slice(2).map((p, i) => (
                                <div key={i} style={{ height: 90, borderRadius: 10, overflow: 'hidden', cursor: 'pointer' }}
                                     onClick={() => setLightbox(`data:image/jpeg;base64,${p.imageBase64}`)}>
                                    <img
                                        src={`data:image/jpeg;base64,${p.imageBase64}`}
                                        alt={`Photo ${i + 3}`}
                                        style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                                        loading="lazy"
                                    />
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {lightbox && <Lightbox src={lightbox} onClose={() => setLightbox(null)} />}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EventDetailPage />);
</script>
</body>
</html>
