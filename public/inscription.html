<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarXMeet — Inscription</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/inscription.css" />
</head>
<body class="flex items-center justify-center p-4 py-10">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    // ─── Composant : InputField ───────────────────────────────────────────────
    function InputField({ label, id, type = "text", value, onChange, placeholder, required, hasError, errorHint }) {
      return (
        <div>
          <label htmlFor={id} className="block text-sm font-medium text-gray-300 mb-1">
            {label} {required && <span className="text-blue-400">*</span>}
          </label>
          <input
            id={id}
            type={type}
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            className={`input-field w-full rounded-lg px-4 py-2.5 text-sm ${hasError ? 'error' : ''}`}
          />
          {hasError && errorHint && (
            <p className="mt-1 text-xs text-red-400">{errorHint}</p>
          )}
        </div>
      );
    }

    // ─── Composant : PasswordField ────────────────────────────────────────────
    function PasswordField({ label, id, value, onChange, placeholder, required, hasError }) {
      const [visible, setVisible] = useState(false);

      return (
        <div>
          <label htmlFor={id} className="block text-sm font-medium text-gray-300 mb-1">
            {label} {required && <span className="text-blue-400">*</span>}
          </label>
          <div className="relative">
            <input
              id={id}
              type={visible ? "text" : "password"}
              value={value}
              onChange={e => onChange(e.target.value)}
              placeholder={placeholder}
              className={`input-field w-full rounded-lg px-4 py-2.5 pr-10 text-sm ${hasError ? 'error' : ''}`}
            />
            <button
              type="button"
              onClick={() => setVisible(v => !v)}
              className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200 transition-colors"
              tabIndex={-1}
            >
              {visible ? (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21" />
                </svg>
              ) : (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              )}
            </button>
          </div>
        </div>
      );
    }

    // ─── Composant : SocialField ──────────────────────────────────────────────
    function SocialField({ label, id, value, onChange, platform }) {
      return (
        <div>
          <label htmlFor={id} className="block text-sm font-medium text-gray-300 mb-1">{label}</label>
          <div className="flex">
            <span className="social-prefix rounded-l-lg px-3 py-2.5 text-sm flex items-center">@</span>
            <input
              id={id}
              type="text"
              value={value}
              onChange={e => onChange(e.target.value)}
              placeholder={platform}
              className="input-field flex-1 rounded-r-lg px-4 py-2.5 text-sm"
              style={{ borderLeft: 'none' }}
            />
          </div>
        </div>
      );
    }

    // ─── Composant : AlertBox ─────────────────────────────────────────────────
    function AlertBox({ type, messages }) {
      const isSuccess = type === 'success';
      return (
        <div className={`rounded-lg p-4 ${isSuccess ? 'bg-green-900 bg-opacity-50 border border-green-500' : 'bg-red-900 bg-opacity-50 border border-red-500'}`}>
          <div className="flex items-start gap-3">
            <div className={`flex-shrink-0 mt-0.5 ${isSuccess ? 'text-green-400' : 'text-red-400'}`}>
              {isSuccess ? (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                </svg>
              ) : (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
                </svg>
              )}
            </div>
            <div>
              {messages.map((msg, i) => (
                <p key={i} className={`text-sm ${isSuccess ? 'text-green-200' : 'text-red-200'}`}>{msg}</p>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── Composant : RegisterForm ─────────────────────────────────────────────
    function RegisterForm() {
      const [fields, setFields] = useState({
        firstName: '', lastName: '', username: '', phone: '',
        email: '', password: '', confirmPassword: '',
        snapchat: '', instagram: '', twitter: '', tiktok: '',
      });
      const [loading, setLoading] = useState(false);
      const [alert, setAlert] = useState(null); // { type: 'success'|'error', messages: [] }
      const [fieldErrors, setFieldErrors] = useState({});

      const set = useCallback((field) => (value) => {
        setFields(f => ({ ...f, [field]: value }));
        setFieldErrors(e => ({ ...e, [field]: false }));
      }, []);

      const validate = () => {
        const errors = {};
        if (!fields.firstName.trim()) errors.firstName = true;
        if (!fields.lastName.trim()) errors.lastName = true;
        if (!fields.username.trim()) errors.username = true;
        if (!fields.phone.trim()) errors.phone = true;
        if (!fields.email.trim()) errors.email = true;
        if (!fields.password) errors.password = true;
        if (fields.password !== fields.confirmPassword) errors.confirmPassword = true;
        return errors;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setAlert(null);

        const errors = validate();
        if (Object.keys(errors).length > 0) {
          setFieldErrors(errors);
          const msgs = [];
          if (errors.firstName) msgs.push('Le prénom est obligatoire');
          if (errors.lastName) msgs.push('Le nom est obligatoire');
          if (errors.username) msgs.push('Le nom d\'utilisateur est obligatoire');
          if (errors.phone) msgs.push('Le téléphone est obligatoire');
          if (errors.email) msgs.push('L\'email est obligatoire');
          if (errors.password) msgs.push('Le mot de passe est obligatoire');
          if (errors.confirmPassword) msgs.push('Les mots de passe ne correspondent pas');
          setAlert({ type: 'error', messages: msgs });
          return;
        }

        setLoading(true);
        try {
          const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
              firstName: fields.firstName.trim(),
              lastName: fields.lastName.trim(),
              username: fields.username.trim(),
              phone: fields.phone.trim(),
              email: fields.email.trim(),
              password: fields.password,
              snapchat: fields.snapchat.trim() || null,
              instagram: fields.instagram.trim() || null,
              twitter: fields.twitter.trim() || null,
              tiktok: fields.tiktok.trim() || null,
            }),
          });

          const data = await response.json();

          if (response.ok) {
            setAlert({ type: 'success', messages: [data.message] });
            setFields({ firstName:'', lastName:'', username:'', phone:'', email:'', password:'', confirmPassword:'', snapchat:'', instagram:'', twitter:'', tiktok:'' });
          } else {
            setAlert({ type: 'error', messages: data.errors || ['Une erreur est survenue'] });
          }
        } catch (err) {
          setAlert({ type: 'error', messages: ['Impossible de contacter le serveur. Réessaie plus tard.'] });
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="w-full max-w-2xl mx-auto">
          {/* Header */}
          <div className="text-center mb-8">
            <h1 className="text-4xl font-black logo-text mb-2">CarXMeet</h1>
            <p className="text-gray-400 text-sm">Rejoins la communauté des passionnés de voitures</p>
          </div>

          <div className="card rounded-2xl p-8 shadow-2xl">
            <h2 className="text-xl font-bold text-white mb-6">Créer un compte</h2>

            {alert && (
              <div className="mb-6">
                <AlertBox type={alert.type} messages={alert.messages} />
                {alert.type === 'success' && (
                  <div className="mt-4 text-center">
                    <a href="/connexion" className="text-blue-400 hover:text-blue-300 text-sm font-medium underline transition-colors">
                      Se connecter →
                    </a>
                  </div>
                )}
              </div>
            )}

            <form onSubmit={handleSubmit} noValidate>
              {/* Identité */}
              <div className="mb-6">
                <h3 className="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-3">Identité</h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <InputField label="Prénom" id="firstName" value={fields.firstName} onChange={set('firstName')} placeholder="Nael" required hasError={fieldErrors.firstName} />
                  <InputField label="Nom" id="lastName" value={fields.lastName} onChange={set('lastName')} placeholder="Khamallah" required hasError={fieldErrors.lastName} />
                  <InputField label="Nom d'utilisateur" id="username" value={fields.username} onChange={set('username')} placeholder="nael_kml" required hasError={fieldErrors.username} />
                  <InputField label="Téléphone" id="phone" type="tel" value={fields.phone} onChange={set('phone')} placeholder="+33 6 00 00 00 00" required hasError={fieldErrors.phone} />
                </div>
              </div>

              {/* Connexion */}
              <div className="mb-6">
                <h3 className="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-3">Connexion</h3>
                <div className="grid grid-cols-1 gap-4">
                  <InputField label="Adresse email" id="email" type="email" value={fields.email} onChange={set('email')} placeholder="nael@carxmeet.fr" required hasError={fieldErrors.email} />
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <PasswordField label="Mot de passe" id="password" value={fields.password} onChange={set('password')} placeholder="8 caractères minimum" required hasError={fieldErrors.password} />
                    <PasswordField label="Confirmer le mot de passe" id="confirmPassword" value={fields.confirmPassword} onChange={set('confirmPassword')} placeholder="Répète le mot de passe" required hasError={fieldErrors.confirmPassword} />
                  </div>
                </div>
              </div>

              {/* Réseaux sociaux */}
              <div className="mb-8">
                <h3 className="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-3">Réseaux sociaux <span className="text-gray-500 normal-case font-normal">(optionnel)</span></h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <SocialField label="Instagram" id="instagram" value={fields.instagram} onChange={set('instagram')} platform="instagram" />
                  <SocialField label="Snapchat" id="snapchat" value={fields.snapchat} onChange={set('snapchat')} platform="snapchat" />
                  <SocialField label="Twitter / X" id="twitter" value={fields.twitter} onChange={set('twitter')} platform="twitter" />
                  <SocialField label="TikTok" id="tiktok" value={fields.tiktok} onChange={set('tiktok')} platform="tiktok" />
                </div>
              </div>

              <button
                type="submit"
                disabled={loading}
                className="btn-primary w-full text-white font-semibold py-3 px-6 rounded-lg text-sm shadow-lg"
              >
                {loading ? (
                  <span className="flex items-center justify-center gap-2">
                    <svg className="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    Inscription en cours…
                  </span>
                ) : 'Créer mon compte'}
              </button>

              <p className="text-center text-gray-400 text-sm mt-4">
                Déjà un compte ?{' '}
                <a href="/connexion" className="text-blue-400 hover:text-blue-300 font-medium transition-colors">
                  Se connecter
                </a>
              </p>
            </form>
          </div>
        </div>
      );
    }

    // ─── Point d'entrée ───────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RegisterForm />);
  </script>
</body>
</html>
