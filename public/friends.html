<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarXMeet — Mes amis</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/friends.css" />
</head>
<body class="p-4 min-h-screen">
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    function getToken() { return localStorage.getItem('jwt_token'); }
    function authHeaders() { return { 'Authorization': 'Bearer ' + getToken() }; }
    function decodeToken() {
        try {
            const payload = JSON.parse(atob(getToken().split('.')[1]));
            return { username: payload.username || payload.sub };
        } catch { return null; }
    }

    function Avatar({ user, size = 44 }) {
        const initials = (user?.username || '?').substring(0, 2).toUpperCase();
        if (user?.profileImageBase64) {
            return (
                <div className="avatar" style={{ width: size, height: size }}>
                    <img src={`data:image/jpeg;base64,${user.profileImageBase64}`} alt={user.username} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                </div>
            );
        }
        return <div className="avatar" style={{ width: size, height: size, fontSize: size * 0.35 }}>{initials}</div>;
    }

    function FriendsPage() {
        const [friends, setFriends] = useState([]);
        const [loading, setLoading] = useState(true);
        const [alert, setAlert] = useState(null);

        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }
            const decoded = decodeToken();
            if (!decoded) { window.location.href = '/connexion.html'; return; }

            fetch(`/api/users?username=${decoded.username}`, { headers: authHeaders() })
                .then(r => {
                    if (r.status === 401) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return null; }
                    return r.json();
                })
                .then(data => {
                    if (!data) return;
                    const users = data['member'] || data['hydra:member'] || [];
                    const me = users.find(u => u.username === decoded.username);
                    if (!me) { setLoading(false); return; }

                    return Promise.all([
                        fetch(`/api/friendships?requesterId=${me.id}&status=accepted`, { headers: authHeaders() }).then(r => r.json()),
                        fetch(`/api/friendships?receiverId=${me.id}&status=accepted`, { headers: authHeaders() }).then(r => r.json()),
                    ]).then(([sent, received]) => {
                        const sentList = sent['member'] || sent['hydra:member'] || [];
                        const receivedList = received['member'] || received['hydra:member'] || [];
                        const list = [];
                        sentList.forEach(f => {
                            const friend = typeof f.receiverId === 'object' ? f.receiverId : null;
                            if (friend) list.push({ ...friend, friendshipId: f.id });
                        });
                        receivedList.forEach(f => {
                            const friend = typeof f.requesterId === 'object' ? f.requesterId : null;
                            if (friend) list.push({ ...friend, friendshipId: f.id });
                        });
                        setFriends(list);
                    });
                })
                .catch(() => setAlert({ type: 'error', message: 'Impossible de charger les amis.' }))
                .finally(() => setLoading(false));
        }, []);

        async function handleRemove(friendshipId) {
            if (!confirm('Supprimer cet ami ?')) return;
            try {
                const res = await fetch(`/api/friendships/${friendshipId}`, { method: 'DELETE', headers: authHeaders() });
                if (!res.ok) throw new Error();
                setFriends(prev => prev.filter(f => f.friendshipId !== friendshipId));
                setAlert({ type: 'success', message: 'Ami retiré.' });
            } catch { setAlert({ type: 'error', message: 'Impossible de retirer cet ami.' }); }
        }

        return (
            <div className="max-w-3xl mx-auto">
                <div className="text-center mb-6 pt-6">
                    <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    <p className="text-white text-sm">La communauté des passionnés de voitures</p>
                </div>

                <div className="card rounded-2xl p-5 shadow-2xl">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                        <h2 className="text-white font-bold text-lg m-0">Mes amis</h2>
                        <a href="/home.html" className="btn-outline inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                            ← Retour accueil
                        </a>
                    </div>

                    {alert && (
                        <div className={`rounded-xl p-3 mb-4 text-sm ${alert.type === 'success' ? 'bg-green-900 bg-opacity-50 border border-green-500 text-green-200' : 'bg-red-900 bg-opacity-50 border border-red-500 text-red-200'}`}>
                            {alert.message}
                        </div>
                    )}

                    {loading && (
                        <div style={{ display: 'grid', gap: 10 }}>
                            {[...Array(3)].map((_, i) => <div key={i} className="skeleton" style={{ height: 64 }} />)}
                        </div>
                    )}

                    {!loading && friends.length === 0 && (
                        <div style={{ padding: 16, border: '1px dashed rgba(255,255,255,0.15)', borderRadius: 12, color: '#9ca3af', fontSize: 14 }}>
                            Aucun ami pour le moment.
                        </div>
                    )}

                    {!loading && friends.length > 0 && (
                        <div style={{ display: 'grid', gap: 10 }}>
                            {friends.map(friend => (
                                <div key={friend.friendshipId} className="inner-card rounded-xl p-3" style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                    <Avatar user={friend} size={44} />
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <a href={`/user-profile.html?id=${friend.id}`} className="text-white font-semibold text-sm" style={{ textDecoration: 'none' }}>
                                            {friend.username}
                                        </a>
                                        <div style={{ fontSize: 12, color: '#ffffff' }}>{friend.firstName} {friend.lastName}</div>
                                    </div>
                                    <button onClick={() => handleRemove(friend.friendshipId)} className="btn-danger px-3 py-1 rounded-xl text-xs font-medium">
                                        Retirer
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FriendsPage />);
</script>
</body>
</html>
