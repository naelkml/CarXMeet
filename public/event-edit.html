<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarXMeet — Modifier événement</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/event-edit.css" />
</head>
<body class="p-4 min-h-screen">
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;

    function getToken() { return localStorage.getItem('jwt_token'); }
    function authHeaders(extra = {}) { return { 'Authorization': 'Bearer ' + getToken(), ...extra }; }
    function decodeToken() {
        try {
            const payload = JSON.parse(atob(getToken().split('.')[1]));
            return { username: payload.username || payload.sub, roles: payload.roles || [] };
        } catch { return null; }
    }
    function getEventIdFromUrl() { return new URLSearchParams(window.location.search).get('id'); }

    function EventEditPage() {
        const [event, setEvent] = useState(null);
        const [regions, setRegions] = useState([]);
        const [fields, setFields] = useState({ title: '', organisateur: '', description: '', type: '', Date: '', location: '', regionID: '' });
        const [coverFile, setCoverFile] = useState(null);
        const [galleryFiles, setGalleryFiles] = useState([]);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);
        const [alert, setAlert] = useState(null);
        const eventId = getEventIdFromUrl();

        useEffect(() => {
            const token = getToken();
            if (!token) { window.location.href = '/connexion.html'; return; }
            const decoded = decodeToken();
            if (!decoded) { window.location.href = '/connexion.html'; return; }
            if (!decoded.roles.includes('ROLE_EVENT_MANAGER') && !decoded.roles.includes('ROLE_ADMIN')) {
                window.location.href = '/events.html';
                return;
            }

            Promise.all([
                fetch(`/api/events/${eventId}`, { headers: authHeaders() }).then(r => {
                    if (r.status === 401) { localStorage.removeItem('jwt_token'); window.location.href = '/connexion.html'; return null; }
                    if (!r.ok) throw new Error();
                    return r.json();
                }),
                fetch('/api/regions', { headers: authHeaders() }).then(r => r.json()),
            ]).then(([ev, regData]) => {
                if (!ev) return;
                setEvent(ev);
                setRegions(regData['member'] || regData['hydra:member'] || []);
                setFields({
                    title: ev.title || '',
                    organisateur: ev.organisateur || '',
                    description: ev.description || '',
                    type: ev.type || '',
                    Date: ev.Date || '',
                    location: ev.location || '',
                    regionID: ev.regionID?.id ? String(ev.regionID.id) : '',
                });
            }).catch(() => setAlert({ type: 'error', message: 'Impossible de charger l\'événement.' }))
              .finally(() => setLoading(false));
        }, [eventId]);

        const set = field => e => setFields(f => ({ ...f, [field]: e.target.value }));

        async function handleSubmit(e) {
            e.preventDefault();
            setSaving(true);
            setAlert(null);
            try {
                const fd = new FormData();
                Object.entries(fields).forEach(([k, v]) => {
                    if (v) fd.append(k, k === 'regionID' ? `/api/regions/${v}` : v);
                });
                if (coverFile) fd.append('coverPhoto', coverFile);
                galleryFiles.forEach(f => fd.append('galleryPhotos[]', f));

                const res = await fetch(`/api/events/${eventId}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken(), 'X-HTTP-Method-Override': 'PATCH' },
                    body: fd
                });
                if (!res.ok) throw new Error();
                setAlert({ type: 'success', message: 'Événement mis à jour !' });
                setCoverFile(null);
                setGalleryFiles([]);
            } catch {
                setAlert({ type: 'error', message: 'Impossible de mettre à jour l\'événement.' });
            } finally {
                setSaving(false);
            }
        }

        async function handleDeletePhoto(photoId) {
            if (!confirm('Supprimer cette photo ?')) return;
            try {
                await fetch(`/api/event_photos/${photoId}`, { method: 'DELETE', headers: authHeaders() });
                setEvent(prev => ({
                    ...prev,
                    galleryPhotos: (prev.galleryPhotos || []).filter(p => p.id !== photoId)
                }));
                setAlert({ type: 'success', message: 'Photo supprimée.' });
            } catch {
                setAlert({ type: 'error', message: 'Impossible de supprimer la photo.' });
            }
        }

        if (loading) {
            return (
                <div className="max-w-2xl mx-auto pt-8">
                    <div className="skeleton" style={{ height: 500, borderRadius: 16 }} />
                </div>
            );
        }

        const galleryPhotos = event?.galleryPhotos || [];

        return (
            <div className="max-w-2xl mx-auto">
                <div className="text-center mb-6 pt-6">
                    <h1 className="text-4xl font-black logo-text mb-1">CarXMeet</h1>
                    <p className="text-gray-400 text-sm">La communauté des passionnés de voitures</p>
                </div>

                <div className="card rounded-2xl p-6 shadow-2xl">
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
                        <h2 className="text-white font-bold text-lg m-0">Modifier événement</h2>
                        <a href={`/event-detail.html?id=${eventId}`} className="btn-outline inline-block px-3 py-2 rounded-xl text-sm font-medium" style={{ textDecoration: 'none' }}>
                            ← Retour
                        </a>
                    </div>

                    {alert && (
                        <div className={`rounded-xl p-3 mb-4 text-sm ${alert.type === 'success' ? 'bg-green-900 bg-opacity-50 border border-green-500 text-green-200' : 'bg-red-900 bg-opacity-50 border border-red-500 text-red-200'}`}>
                            {alert.message}
                        </div>
                    )}

                    {/* Cover actuelle */}
                    {event?.imageBase64 && (
                        <div style={{ marginBottom: 16, borderRadius: 12, overflow: 'hidden', height: 180 }}>
                            <img src={`data:image/jpeg;base64,${event.imageBase64}`} alt="Cover" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                        </div>
                    )}

                    {/* Galerie actuelle */}
                    {galleryPhotos.length > 0 && (
                        <div style={{ marginBottom: 16 }}>
                            <p className="input-label mb-2">Galerie ({galleryPhotos.length}/8)</p>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(130px, 1fr))', gap: 8 }}>
                                {galleryPhotos.map(p => (
                                    <div key={p.id} className="gallery-tile">
                                        <div className="gallery-tile-img">
                                            {p.imageBase64 && (
                                                <img src={`data:image/jpeg;base64,${p.imageBase64}`} alt="Photo" />
                                            )}
                                        </div>
                                        <div className="gallery-tile-actions">
                                            <button onClick={() => handleDeletePhoto(p.id)} className="btn-danger py-1 rounded-lg text-xs font-medium" style={{ width: '100%' }}>
                                                Supprimer
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <form onSubmit={handleSubmit} style={{ display: 'grid', gap: 14 }}>
                        <div>
                            <label className="input-label">Titre</label>
                            <input type="text" className="input-field" value={fields.title} onChange={set('title')} placeholder="Cars & Coffee Paris" />
                        </div>
                        <div>
                            <label className="input-label">Organisateur</label>
                            <input type="text" className="input-field" value={fields.organisateur} onChange={set('organisateur')} placeholder="Nom de l'organisateur" />
                        </div>
                        <div>
                            <label className="input-label">Description</label>
                            <textarea className="input-field" rows={5} value={fields.description} onChange={set('description')} style={{ resize: 'vertical' }} />
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                            <div>
                                <label className="input-label">Type</label>
                                <input type="text" className="input-field" value={fields.type} onChange={set('type')} placeholder="Rassemblement, Circuit…" />
                            </div>
                            <div>
                                <label className="input-label">Date</label>
                                <input type="date" className="input-field" value={fields.Date} onChange={set('Date')} />
                            </div>
                        </div>
                        <div>
                            <label className="input-label">Lieu</label>
                            <input type="text" className="input-field" value={fields.location} onChange={set('location')} placeholder="Paris, Champs-Élysées" />
                        </div>
                        <div>
                            <label className="input-label">Région</label>
                            <select className="select-field" value={fields.regionID} onChange={set('regionID')}>
                                <option value="">— Sélectionner une région —</option>
                                {regions.map(r => (
                                    <option key={r.id} value={r.id}>{r.name}</option>
                                ))}
                            </select>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                            <div>
                                <label className="input-label">Nouvelle photo de couverture</label>
                                <input type="file" accept="image/*" className="input-field" onChange={e => setCoverFile(e.target.files[0])} style={{ padding: '8px 12px' }} />
                            </div>
                            <div>
                                <label className="input-label">Ajouter des photos galerie</label>
                                <input type="file" accept="image/*" multiple className="input-field" onChange={e => setGalleryFiles(Array.from(e.target.files))} style={{ padding: '8px 12px' }} />
                            </div>
                        </div>
                        <button type="submit" disabled={saving} className="btn-primary w-full font-semibold py-3 px-6 rounded-xl text-sm">
                            {saving ? 'Enregistrement…' : 'Enregistrer'}
                        </button>
                    </form>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EventEditPage />);
</script>
</body>
</html>
